<div class="paths">
  <xng-breadcrumb separator=">" class="pt-3 pt-3"></xng-breadcrumb>
</div>

<div *ngIf="isLoading" class="spinner">
  <mat-progress-spinner mode="indeterminate"> </mat-progress-spinner>
</div>

<div class="mt-3 pt-3 pt-3 featured-products-item">
  <table class="" *ngIf="!isLoading && paginatedAssets?.length" mat-table [dataSource]="dataSource">
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef style="font-weight: bolder">
        {{ 'MY-LIBRARY.DISPLAY-COLUMNS.NAME' | translate }}
      </th>
      <td mat-cell *matCellDef="let asset">
        <a
          [routerLink]="['/resources', asset.identifier]"
          [queryParams]="{ category: asset.category }"
        >
          {{ asset.name }}
        </a>
      </td>
    </ng-container>

    <!-- Category Column -->
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef style="font-weight: bolder">
        {{ 'MY-LIBRARY.DISPLAY-COLUMNS.CATEGORY' | translate }}
      </th>
      <td mat-cell *matCellDef="let asset">
        <mat-chip
          class="chip"
          [style.background]="getColorCategory(asset.category)"
        >
          <span class="chip-asset-category">
            {{ asset.category }}</span
          >
        </mat-chip>
      </td>
    </ng-container>

    <!-- Link Column -->
    <ng-container matColumnDef="urlMetadata">
      <th mat-header-cell *matHeaderCellDef>
        {{ 'MY-LIBRARY.DISPLAY-COLUMNS.LINK' | translate }}
      </th>
      <td mat-cell *matCellDef="let asset">
        <a
          *ngIf="!!asset.urlMetadata"
          [href]="asset.urlMetadata"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="'MY-LIBRARY.OPEN-LINK' | translate"
          class="external-link"
          [matTooltip]="asset.urlMetadata"
          matTooltipPosition="above"
          matTooltipShowDelay="200"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3z" />
            <path d="M5 5h5V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-5h-2v5H5V5z" />
          </svg>
        </a>
      </td>
    </ng-container>

    <!-- Delete Column -->
    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let asset">
        <button
          mat-icon-button
          class="delete-button"
          (click)="deleteAssetMyLibrary(asset)"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            width="24"
            height="24"
            fill="currentColor"
          >
            <path
              d="M3 6h18v2H3V6zm2 3h14l-1.5 12.5c-.1.8-.8 1.5-1.6 1.5H8.1c-.8 0-1.5-.7-1.6-1.5L5 9zm5 2v8h2v-8h-2zm4 0v8h2v-8h-2zM9 4h6v2H9V4z"
            />
          </svg>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      class="element-row"
      *matRowDef="let row; columns: displayedColumns"
    ></tr>
  </table>
</div>

<div class="paginator-container" *ngIf="!isLoading && allAssets?.length">
  <div class="custom-paginator">
    <div class="paginator-left">
      <span class="page-size-label">{{ 'ASSETS-LIST.ITEMS_PER_PAGE' | translate }}:</span>
      <select
        class="page-size-select"
        [(ngModel)]="currentPageSize"
        (change)="onPageSizeChange($event)"
      >
        <option *ngFor="let size of pageSizeOptions" [value]="size">
          {{ size }}
        </option>
      </select>
    </div>
    <div class="paginator-right">
      <span class="range-label">
        <ng-container *ngIf="assetsSize === null; else showRange">
          <div>
            <mat-progress-spinner class="custom-spinner" mode="indeterminate" diameter="20"></mat-progress-spinner>
          </div>
        </ng-container>
        <ng-template #showRange>{{ getRangeLabel() }}</ng-template>
      </span>
      <button
        class="nav-button prev-page"
        [disabled]="currentPage === 0"
        (click)="goToPage(currentPage - 1)"
        title="Previous page"
      >
        <span>&#8249;</span>
      </button>
      <button
        class="nav-button next-page"
        [disabled]="currentPage >= getTotalPages() - 1"
        (click)="goToPage(currentPage + 1)"
        title="Next page"
      >
        <span>&#8250;</span>
      </button>
    </div>
  </div>
</div>
