<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Silent Refresh</title>
</head>
<body>
    <script>
        var targetOrigin = (new URL(window.location.href)).searchParams.get('origin');
        
        if (!targetOrigin) {
            // Fallback to the current origin
            targetOrigin = window.location.origin;
        }
        
        var message = location.hash || location.search;
        
        if (window.parent && message) {
            window.parent.postMessage(message, targetOrigin);
        }
    </script>
</body>
</html>
